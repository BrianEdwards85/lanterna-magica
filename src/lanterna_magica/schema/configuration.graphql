type Configuration {
  id: ID!
  dimensions: [Dimension!]!
  body: JSON!
  isCurrent: Boolean!
  createdAt: DateTime!
  substitutions: [ConfigSubstitution!]!
}

type ConfigurationEdge {
  node: Configuration!
  cursor: String!
}

type ConfigurationConnection {
  edges: [ConfigurationEdge!]!
  pageInfo: PageInfo!
}

type ConfigSubstitution {
  id: ID!
  configuration: Configuration!
  jsonpath: String!
  sharedValue: SharedValue!
  createdAt: DateTime!
}

input ConfigSubstitutionInput {
  jsonpath: String!
  sharedValueId: ID!
}

input CreateConfigurationInput {
  dimensionIds: [ID!]!
  body: JSON!
  substitutions: [ConfigSubstitutionInput!]
}

input SetConfigSubstitutionInput {
  configurationId: ID!
  jsonpath: String!
  sharedValueId: ID!
}

extend type Query {
  configurations(
    dimensionIds: [ID!]
    includeBase: Boolean
    first: Int
    after: String
  ): ConfigurationConnection!
  configuration(id: ID!): Configuration
}

extend type Mutation {
  createConfiguration(input: CreateConfigurationInput!): Configuration!
  updateConfigSubstitution(input: SetConfigSubstitutionInput!): ConfigSubstitution!
}
