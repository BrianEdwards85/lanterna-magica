type Environment {
  id: ID!
  name: String!
  description: String
  createdAt: DateTime!
  updatedAt: DateTime!
  archivedAt: DateTime
}

type EnvironmentEdge {
  node: Environment!
  cursor: String!
}

type EnvironmentConnection {
  edges: [EnvironmentEdge!]!
  pageInfo: PageInfo!
}

input CreateEnvironmentInput {
  name: String!
  description: String
}

input UpdateEnvironmentInput {
  id: ID!
  name: String
  description: String
}

extend type Query {
  environments(
    includeArchived: Boolean
    first: Int
    after: String
    search: String
  ): EnvironmentConnection!
  environment(id: ID!): Environment
}

extend type Mutation {
  createEnvironment(input: CreateEnvironmentInput!): Environment!
  updateEnvironment(input: UpdateEnvironmentInput!): Environment!
  archiveEnvironment(id: ID!): Environment!
  unarchiveEnvironment(id: ID!): Environment!
}
