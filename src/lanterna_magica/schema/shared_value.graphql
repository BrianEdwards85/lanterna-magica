type SharedValue {
  id: ID!
  name: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  archivedAt: DateTime
  revisions(
    dimensionIds: [ID!]
    includeBase: Boolean
    currentOnly: Boolean
    first: Int
    after: String
  ): SharedValueRevisionConnection!
  usedBy(
    includeArchived: Boolean
    first: Int
    after: String
  ): ConfigurationConnection!
}

type SharedValueEdge {
  node: SharedValue!
  cursor: String!
}

type SharedValueConnection {
  edges: [SharedValueEdge!]!
  pageInfo: PageInfo!
}

type SharedValueRevision {
  id: ID!
  sharedValue: SharedValue!
  dimensions: [Dimension!]!
  value: JSON!
  isCurrent: Boolean!
  createdAt: DateTime!
}

type SharedValueRevisionEdge {
  node: SharedValueRevision!
  cursor: String!
}

type SharedValueRevisionConnection {
  edges: [SharedValueRevisionEdge!]!
  pageInfo: PageInfo!
}

input CreateSharedValueInput {
  name: String!
}

input UpdateSharedValueInput {
  id: ID!
  name: String
}

input CreateSharedValueRevisionInput {
  sharedValueId: ID!
  dimensionIds: [ID!]!
  value: JSON!
}

extend type Query {
  sharedValues(
    includeArchived: Boolean
    search: String
    first: Int
    after: String
  ): SharedValueConnection!
  sharedValuesByIds(ids: [ID!]!): [SharedValue!]!
  resolveSharedValue(sharedValueId: ID!, dimensionIds: [ID!]!): SharedValueRevision
}

extend type Mutation {
  createSharedValue(input: CreateSharedValueInput!): SharedValue!
  updateSharedValue(input: UpdateSharedValueInput!): SharedValue!
  archiveSharedValue(id: ID!): SharedValue!
  unarchiveSharedValue(id: ID!): SharedValue!
  createSharedValueRevision(input: CreateSharedValueRevisionInput!): SharedValueRevision!
  setRevisionCurrent(id: ID!, isCurrent: Boolean!): SharedValueRevision!
}
